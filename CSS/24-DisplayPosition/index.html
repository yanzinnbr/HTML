<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posição do Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Display Position</h1>
    <br>
    <h2>Display Block</h2>

    <ul class="block">

        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <br>
    <h2 >Display Inline</h2>
    <ul class="inline">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <br>
        <br>
        <h2>Display Inline Block</h2>
        <ul class="inline-block">
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>    
        <br>
        <h2>Display None</h2>
        <ul class="none">

            <li>Item 1</li>
        </ul>
</body>
</html>
