<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidade FR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Unidade FR</h1>


    <h2>Colunas com espaçamento igual</h2>
    <section class="conteiner igual">
        <div class="item"><strong>1fr</strong></div>
        <div class="item"><strong>1fr</strong></div>
        <div class="item"><strong>1fr</strong></div>
    </section>

    <h2>Coluna do meio maior</h2>
    <section class="conteiner grid-meio-maior">
        <div class="item"><strong>1fr</strong></div>
        <div class="item"><strong>2fr</strong></div>
        <div class="item"><strong>1fr</strong></div>
    </section>

    <h2>Coluna com espaçamento crescente</h2>
    <section class="conteiner grid-conteiner">
        <div class="item"><strong>1fr</strong></div>
        <div class="item"><strong>2fr</strong></div>
        <div class="item"><strong>3fr</strong></div>
    </section>


</body>
</html>
