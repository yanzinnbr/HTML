<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Float e Cleart</h1>

    <div class="float-left">
        <p>Elemento a esquerda</p>

    </div>

    <div class="float-right">

        <p>Elemento a Direita</p>
    </div>
    

    <div class="float-float">
        <p>Elemento sem Float</p>
    </div>

    <div class="float-clear">
        <p>Elemento com Clear</p>

    </div>
</body>
</html>
