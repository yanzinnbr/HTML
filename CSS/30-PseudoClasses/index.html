<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PseudoClasses</h1>
    <h2>:hover</h2>
    <button>Clique Aqui!!</button>
    <h2>:focus</h2>
    <input type="text" placeholder="Clique aqui!">
    <hr>
    <h2>:active</h2>
    <button>Clique e segure!</button>
    <br>

    <h2>:visited</h2>
    <a href="#">Clique aqui</a>

    <hr>

    <h2>:checked</h2>
    <label>
        <input type="checkbox">
        Clique
    </label>
    <hr>

    <h2>:disabled</h2>
    <input type="text" value="Desativado" disabled>
    <hr>

    <h2>;first-child, :last-child, :mth-child(n)</h2>
    <ul>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
        <li>Último</li>
    </ul>

    <hr>




    


    
</body>
</html>
