<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esconder elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Esconder Elementos</h1>
    <h2>Display None</h2>
    <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa display-none">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>

    <h2>Visibility Hidden</h2>
    <div class="Exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa visibility-hidden">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    
    </div>
    
    <h2>Opacity 0</h2>
    <div class="Exemplos">
        <div class="caixa normal">Caixa</div>
    <div class="caixa opacity-zero">Caixa Oculta</div>
    <div class="caixa normal">Caixa</div>
    


    </div>
    
    
</body>
</html>
