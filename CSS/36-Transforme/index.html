<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Transform</h1>

    <div class="conteiner">

        <div class="bloco">
            <h2>Scale</h2>
            <div class="caixa translate">
                MOVER
            </div>
            <p>move o bagulho</p>
            </div>



        
        <div class="bloco">
            <h2>Scale</h2>
            <div class="caixa scale">
                Aumentar
            </div>
            <p>maumenta ou diminui visuamente o tamanho do elemento</p>
            
        </div>
        <div class="bloco">
                <h2>rotate</h2>

                <div class="rotate">
                    GIRAR
                </div>
                <p>Gira visualmente meu penis na cara do mauro</p>
            </div>
            <div class="bloco">
                <h2>skiew</h2>

                <div class="caixa skew">
                    INCLINAR
                </div>
                <p>Inclina visualemente meu penis horizontal na cara do mauro</p>
            </div>

            <div class="bloco">
                <h2>Botão com HOVER</h2>

                <button class="botao"> BOTAO COM HOVER</button>
                <p>Botão se altera ao passar o mouse</p>
            </div>

    </div>
    
</body>
</html>
