<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISPLAY GRID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>DISPLAY GRID</h1>

    <h2>GRID</h2>
    <section class="conteiner grid">
        <div class="item"><strong>Item 1</strong></div>
        <div class="item"><strong>Item 2</strong></div>
        <div class="item"><strong>Item 3</strong></div>
        <div class="item"><strong>Item 4</strong></div>
        <div class="item"><strong>Item 5</strong></div>
        <div class="item"><strong>Item 6</strong></div>
    </section>

     <h2>Inline GRID</h2>
    <section class="conteiner inline-grid">
        <div class="item"><strong>Item 1</strong></div>
        <div class="item"><strong>Item 2</strong></div>
        <div class="item"><strong>Item 3</strong></div>
        <div class="item"><strong>Item 4</strong></div>
        <div class="item"><strong>Item 5</strong></div>
        <div class="item"><strong>Item 6</strong></div>
    </section>

     <h2>Gap no GRID</h2>
    <section class="conteiner gap-separado">
        <div class="item"><strong>Item 1</strong></div>
        <div class="item"><strong>Item 2</strong></div>
        <div class="item"><strong>Item 3</strong></div>
        <div class="item"><strong>Item 4</strong></div>
        <div class="item"><strong>Item 5</strong></div>
        <div class="item"><strong>Item 6</strong></div>
    </section>
    
</body>
</html>
