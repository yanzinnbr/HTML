<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Text</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Input Text</h1>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" placeholder="Digite seu nome" value="Yan" maxlength="10" minlength="3" required autofocus readonly >
    <br><br>
    <label for="sobrenome">sobrenome:</label>
    <input type="text" id="sobrenome" placeholder="Digite seu sobrenome" value="" maxlength="10" minlength="3" required autofocus disabled name="nome">
    <br><br>
    <label for="apelido"> Apelido:</label>
    <input type="text" id="sobrenome" placeholder="Digite seu apelido" pattern="[A-Za-Z]+" maxlength="10" minlength="2" title="Aqui você pode digitar seu apelido">
    

    

    
</body>
</html>
