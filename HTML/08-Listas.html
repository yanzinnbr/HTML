<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listas</title>
  </head>
  <body>
    <h3>Lista não ordenada</h3>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>

    <h3>Lista ordenada</h3>
    <ol>
      <li>Item A</li>
      <li>Item B</li>
      <li>Item C</li>
    </ol>

    <ol>
      <li>Yan</li>
      <li>Samuel</li>
      <li>Mauro</li>
      <li>Marlon</li>
      <li>Marquinho</li>
    </ol>
  </body>
</html>
