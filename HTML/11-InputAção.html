<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputo Ação</title>
</head>
<body>
    <h1>Input Ação</h1>

    <label for="numero">Número</label>
    <input type="number" id="idade" max="10" value="2" title="Digite sua idade">
    <br><br>
    <label for="Senha">Senha:</label>

    <input type="password" minlength="10" maxlength="30" required placeholder="Senha" title="Aqui é o campo da senha!">
    <br><br>

    <label for="confirmação">Confirmação</label>
    <input type="submit" value="Enviar">
    <br><br>

    <label for="limpar">Limpa os dados do formulario</label>
    <input type="reset" value="Limpar">

    
</body>
</html>
