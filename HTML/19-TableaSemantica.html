<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Semantica</title>
</head>
<body>

    <h1>Tabelas Semântica</h1>

    <table border="5">
        <caption>
            Titulo Tabelas
        </caption>

        <thead>

            <tr>
                <th>Titulo 1</th>
                
                <th>Titulo 2</th>
                
                <th> Titulo 3</th>
    
            </tr>

            
        </thead>


        <tbody>

               <tr>
                <td>Dado 1</td>
               </tr>
               <tr>
                <td>Dado 2</td>
               </tr>
               <tr>
                <td>Dado 3</td>
               </tr>
                 
            
            </tbody>

            <tfoot>
                <th scope="row" colspan="3">Rodapé</th>
            </tfoot>
            
    </table>
   


   
</body>
</html>
